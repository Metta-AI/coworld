<!doctype html>
<title>Coworld Paint Arena Global Client</title>
<style>
  body { color: #172033; font-family: system-ui, sans-serif; margin: 24px; }
  #arena { background: #f7f9fc; border: 1px solid #b8c4d8; display: grid; gap: 2px; margin: 16px 0; width: min(720px, 100%); }
  .cell { aspect-ratio: 1; background: white; border-radius: 3px; position: relative; }
  .agent { color: white; display: grid; font-size: 12px; font-weight: 700; place-items: center; }
  .owned-0 { background: #93c5fd; }
  .owned-1 { background: #fca5a5; }
  .owned-2 { background: #86efac; }
  .owned-3 { background: #c4b5fd; }
  .agent-0 { background: #2563eb; }
  .agent-1 { background: #dc2626; }
  .agent-2 { background: #059669; }
  .agent-3 { background: #7c3aed; }
  pre { background: #f5f5f5; padding: 12px; width: min(720px, 100%); }
</style>
<h1>Paint Arena</h1>
<div id="status"></div>
<div id="arena"></div>
<pre id="scores"></pre>
<script>
  const websocketUrl = new URL(window.location.href);
  websocketUrl.protocol = websocketUrl.protocol === "https:" ? "wss:" : "ws:";

  const arena = document.getElementById("arena");
  const status = document.getElementById("status");
  const scores = document.getElementById("scores");

  function draw(message) {
    arena.style.gridTemplateColumns = `repeat(${message.width}, 1fr)`;
    const agents = new Map(message.positions.map((position, slot) => [`${position[0]},${position[1]}`, slot]));
    const cells = [];
    for (let y = 0; y < message.height; y += 1) {
      for (let x = 0; x < message.width; x += 1) {
        const key = `${x},${y}`;
        const owner = message.tile_owners[y * message.width + x];
        const cell = document.createElement("div");
        cell.className = "cell";
        if (owner >= 0) cell.classList.add(`owned-${owner}`);
        if (agents.has(key)) {
          const slot = agents.get(key);
          cell.className = `cell agent owned-${slot} agent-${slot}`;
          cell.textContent = slot + 1;
        }
        cells.push(cell);
      }
    }
    arena.replaceChildren(...cells);
    status.textContent = `${message.done ? "Done" : "Running"} tick ${message.tick}/${message.max_ticks}`;
    scores.textContent = JSON.stringify({ scores: message.scores, paused: message.paused }, null, 2);
  }

  const socket = new WebSocket(websocketUrl);
  socket.onopen = () => { status.textContent = "Connected"; };
  socket.onmessage = (event) => draw(JSON.parse(event.data));
  socket.onclose = () => { status.textContent = "Disconnected"; };
</script>
