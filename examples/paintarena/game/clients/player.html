<!doctype html>
<title>Coworld Paint Arena Player Client</title>
<style>
  body { color: #172033; font-family: system-ui, sans-serif; margin: 24px; }
  #arena { background: #f7f9fc; border: 1px solid #b8c4d8; display: grid; gap: 2px; margin: 16px 0; width: min(720px, 100%); }
  .cell { aspect-ratio: 1; background: white; border-radius: 3px; position: relative; }
  .owned-0 { background: #93c5fd; }
  .owned-1 { background: #fca5a5; }
  .owned-2 { background: #86efac; }
  .owned-3 { background: #c4b5fd; }
  .agent { color: white; display: grid; font-size: 12px; font-weight: 700; place-items: center; }
  .agent-0 { background: #2563eb; }
  .agent-1 { background: #dc2626; }
  .agent-2 { background: #059669; }
  .agent-3 { background: #7c3aed; }
  .you { box-shadow: inset 0 0 0 3px #111827; }
  #identity { align-items: center; display: flex; gap: 10px; margin: 8px 0; }
  #swatch { border: 1px solid #111827; display: inline-block; height: 18px; width: 18px; }
  #pad { display: grid; gap: 8px; grid-template-columns: repeat(3, 56px); margin: 16px 0; }
  button { background: white; border: 1px solid #9aa8bd; border-radius: 6px; font-size: 20px; height: 56px; }
  button:active { background: #e8eef8; }
  pre { background: #f5f5f5; padding: 12px; width: min(520px, 100%); }
</style>
<h1>Paint Arena</h1>
<div id="status"></div>
<div id="identity"><span id="swatch"></span><span id="identityText">Connecting</span></div>
<div id="arena"></div>
<div id="pad">
  <span></span><button data-move="up" type="button">↑</button><span></span>
  <button data-move="left" type="button">←</button><button data-move="stay" type="button">•</button><button data-move="right" type="button">→</button>
  <span></span><button data-move="down" type="button">↓</button><span></span>
</div>
<div id="lastMove"></div>
<pre id="state"></pre>
<script>
  const websocketUrl = new URL(window.location.href);
  websocketUrl.protocol = websocketUrl.protocol === "https:" ? "wss:" : "ws:";

  const status = document.getElementById("status");
  const arena = document.getElementById("arena");
  const identityText = document.getElementById("identityText");
  const lastMove = document.getElementById("lastMove");
  const state = document.getElementById("state");
  const swatch = document.getElementById("swatch");
  const colors = ["#2563eb", "#dc2626", "#059669", "#7c3aed"];
  let done = false;
  let slot = null;
  let socket;

  function draw(message) {
    slot = message.slot;
    swatch.style.background = colors[slot];
    identityText.textContent = `You are player ${slot + 1}`;
    arena.style.gridTemplateColumns = `repeat(${message.width}, 1fr)`;
    const agents = new Map(message.positions.map((position, slot) => [`${position[0]},${position[1]}`, slot]));
    const cells = [];
    for (let y = 0; y < message.height; y += 1) {
      for (let x = 0; x < message.width; x += 1) {
        const key = `${x},${y}`;
        const owner = message.tile_owners[y * message.width + x];
        const cell = document.createElement("div");
        cell.className = "cell";
        if (owner >= 0) cell.classList.add(`owned-${owner}`);
        if (agents.has(key)) {
          const agentSlot = agents.get(key);
          cell.className = `cell agent owned-${agentSlot} agent-${agentSlot}`;
          if (agentSlot === slot) cell.classList.add("you");
          cell.textContent = agentSlot + 1;
        }
        cells.push(cell);
      }
    }
    arena.replaceChildren(...cells);
  }

  socket = new WebSocket(websocketUrl);
  socket.onopen = () => { status.textContent = "Connected"; };
  socket.onmessage = (event) => {
    const message = JSON.parse(event.data);
    draw(message);
    if (!message.started) status.textContent = "Waiting for all players";
    if (message.started && !message.done) status.textContent = "Running";
    state.textContent = JSON.stringify({
      slot: message.slot,
      position: message.positions[message.slot],
      scores: message.scores,
      tick: message.tick,
    }, null, 2);
    if (message.done) {
      done = true;
      status.textContent = "Done";
    }
  };
  socket.onclose = () => {
    if (!done) status.textContent = "Disconnected";
  };

  function sendMove(move) {
    if (socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({ move }));
    lastMove.textContent = `Last move: ${move}`;
  }

  for (const button of document.querySelectorAll("button")) {
    button.onclick = () => sendMove(button.dataset.move);
  }

  window.onkeydown = (event) => {
    const moves = { ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right", " ": "stay" };
    if (event.key in moves) {
      event.preventDefault();
      sendMove(moves[event.key]);
    }
  };
</script>
