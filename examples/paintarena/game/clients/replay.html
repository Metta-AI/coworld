<!doctype html>
<title>Coworld Paint Arena Replay Client</title>
<style>
  body {
    color: #172033;
    font-family: system-ui, sans-serif;
    margin: 24px;
  }
  #arena {
    background: #f7f9fc;
    border: 1px solid #b8c4d8;
    display: grid;
    gap: 2px;
    margin: 16px 0;
    width: min(720px, 100%);
  }
  .cell {
    aspect-ratio: 1;
    background: white;
    border-radius: 3px;
    position: relative;
  }
  .owned-0 {
    background: #93c5fd;
  }
  .owned-1 {
    background: #fca5a5;
  }
  .owned-2 {
    background: #86efac;
  }
  .owned-3 {
    background: #c4b5fd;
  }
  .agent {
    color: white;
    display: grid;
    font-size: 12px;
    font-weight: 700;
    place-items: center;
  }
  .agent-0 {
    background: #2563eb;
  }
  .agent-1 {
    background: #dc2626;
  }
  .agent-2 {
    background: #059669;
  }
  .agent-3 {
    background: #7c3aed;
  }
  button {
    background: white;
    border: 1px solid #9aa8bd;
    border-radius: 6px;
    padding: 8px 12px;
  }
  input {
    vertical-align: middle;
    width: min(520px, 100%);
  }
  pre {
    background: #f5f5f5;
    padding: 12px;
    width: min(720px, 100%);
  }
</style>
<h1>Paint Arena Replay</h1>
<div id="status"></div>
<button id="play" type="button">Play</button>
<button id="pause" type="button">Pause</button>
<button id="slower" type="button">Slower</button>
<button id="faster" type="button">Faster</button>
<input id="scrubber" min="0" type="range" value="0" />
<div id="arena"></div>
<pre id="summary"></pre>
<script type="module">
  const websocketUrl = new URL(window.location.href);
  websocketUrl.protocol = websocketUrl.protocol === "https:" ? "wss:" : "ws:";

  const arena = document.getElementById("arena");
  const status = document.getElementById("status");
  const summary = document.getElementById("summary");
  const play = document.getElementById("play");
  const pause = document.getElementById("pause");
  const slower = document.getElementById("slower");
  const faster = document.getElementById("faster");
  const scrubber = document.getElementById("scrubber");
  let frames = [];
  let results = {};
  let frameIndex = 0;
  let speed = 1;
  let timer = null;

  function draw(message) {
    arena.style.gridTemplateColumns = `repeat(${message.width}, 1fr)`;
    const agents = new Map(message.positions.map((position, slot) => [`${position[0]},${position[1]}`, slot]));
    const cells = [];
    for (let y = 0; y < message.height; y += 1) {
      for (let x = 0; x < message.width; x += 1) {
        const key = `${x},${y}`;
        const owner = message.tile_owners[y * message.width + x];
        const cell = document.createElement("div");
        cell.className = "cell";
        if (owner >= 0) cell.classList.add(`owned-${owner}`);
        if (agents.has(key)) {
          const slot = agents.get(key);
          cell.className = `cell agent owned-${slot} agent-${slot}`;
          cell.textContent = slot + 1;
        }
        cells.push(cell);
      }
    }
    arena.replaceChildren(...cells);
    scrubber.value = frameIndex;
    status.textContent = `Frame ${frameIndex + 1}/${frames.length} tick ${message.tick} speed ${speed}x`;
    summary.textContent = JSON.stringify({ scores: message.scores, final: results }, null, 2);
  }

  function showFrame(index) {
    frameIndex = Math.min(Math.max(index, 0), frames.length - 1);
    draw(frames[frameIndex]);
  }

  function stop() {
    clearInterval(timer);
    timer = null;
  }

  function start() {
    stop();
    timer = setInterval(() => {
      if (frameIndex >= frames.length - 1) {
        stop();
      } else {
        showFrame(frameIndex + 1);
      }
    }, 200 / speed);
  }

  const socket = new WebSocket(websocketUrl);
  socket.onopen = () => {
    status.textContent = "Connected";
  };
  socket.onmessage = (event) => {
    const message = JSON.parse(event.data);
    if (message.type !== "replay") return;
    frames = message.frames;
    results = message.results;
    scrubber.max = Math.max(frames.length - 1, 0);
    if (frames.length > 0) showFrame(0);
  };
  socket.onclose = () => {
    if (frames.length === 0) status.textContent = "Disconnected";
  };

  play.onclick = () => start();
  pause.onclick = () => stop();
  slower.onclick = () => {
    speed = Math.max(speed / 2, 0.25);
    if (timer) start();
    if (frames.length > 0) draw(frames[frameIndex]);
  };
  faster.onclick = () => {
    speed = Math.min(speed * 2, 8);
    if (timer) start();
    if (frames.length > 0) draw(frames[frameIndex]);
  };
  scrubber.oninput = () => {
    stop();
    showFrame(Number(scrubber.value));
  };
</script>
