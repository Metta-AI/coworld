<!doctype html>
<title>Cogs vs Clips Global Client</title>
<style>
  :root {
    color: #172033;
    font-family: system-ui, sans-serif;
  }
  body {
    margin: 0;
    background: #f6f7f9;
  }
  header {
    align-items: center;
    background: #ffffff;
    border-bottom: 1px solid #d7dde7;
    display: flex;
    gap: 16px;
    padding: 12px 18px;
  }
  h1 {
    font-size: 18px;
    line-height: 1.2;
    margin: 0;
  }
  #status {
    color: #4a5568;
    font-size: 13px;
  }
  main {
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(360px, 1fr) 320px;
    height: calc(100vh - 53px);
    padding: 14px;
  }
  #mettascopeWrap {
    background: #05070a;
    border: 1px solid #1f2937;
    min-height: 360px;
    position: relative;
  }
  #mettascope {
    border: 0;
    display: none;
    height: 100%;
    width: 100%;
  }
  #fallback {
    background: #ffffff;
    border: 1px solid #d7dde7;
    display: grid;
    min-height: 360px;
    place-items: center;
  }
  canvas {
    height: min(78vh, 720px);
    image-rendering: pixelated;
    width: min(78vh, 720px);
  }
  aside {
    background: #ffffff;
    border: 1px solid #d7dde7;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 12px;
  }
  h2 {
    font-size: 14px;
    margin: 0 0 10px;
  }
  dl {
    display: grid;
    font-size: 13px;
    gap: 7px 10px;
    grid-template-columns: auto 1fr;
    margin: 0 0 12px;
  }
  dt {
    color: #667085;
  }
  dd {
    margin: 0;
    overflow-wrap: anywhere;
  }
  pre {
    background: #f2f4f7;
    border: 1px solid #d7dde7;
    flex: 1;
    margin: 0;
    min-height: 0;
    overflow: auto;
    padding: 10px;
    white-space: pre-wrap;
  }
  @media (max-width: 820px) {
    main {
      grid-template-columns: 1fr;
      height: auto;
    }
    canvas {
      height: min(92vw, 680px);
      width: min(92vw, 680px);
    }
  }
</style>
<header>
  <h1>Cogs vs Clips</h1>
  <div id="status">Connecting</div>
</header>
<main>
  <section id="mettascopeWrap">
    <iframe id="mettascope" title="MettaScope"></iframe>
    <div id="fallback"><canvas id="board" width="720" height="720"></canvas></div>
  </section>
  <aside>
    <h2>Live State</h2>
    <dl>
      <dt>Protocol</dt>
      <dd id="protocol">-</dd>
      <dt>Mission</dt>
      <dd id="mission">-</dd>
      <dt>Step</dt>
      <dd id="step">-</dd>
      <dt>Players</dt>
      <dd id="players">-</dd>
      <dt>Scores</dt>
      <dd id="scores">-</dd>
    </dl>
    <pre id="latest"></pre>
  </aside>
</main>
<script>
  const websocketUrl = new URL(window.location.href)
  websocketUrl.protocol = websocketUrl.protocol === 'https:' ? 'wss:' : 'ws:'

  const status = document.getElementById('status')
  const protocol = document.getElementById('protocol')
  const mission = document.getElementById('mission')
  const step = document.getElementById('step')
  const players = document.getElementById('players')
  const scores = document.getElementById('scores')
  const latest = document.getElementById('latest')
  const mettascope = document.getElementById('mettascope')
  const fallback = document.getElementById('fallback')
  const canvas = document.getElementById('board')
  const ctx = canvas.getContext('2d')

  const agentColors = ['#2563eb', '#dc2626', '#059669', '#7c3aed', '#c2410c', '#0891b2', '#9333ea', '#4d7c0f']
  let mapSize = [24, 24]
  let staticObjects = []
  let dynamicObjects = []

  async function loadMettascope() {
    try {
      const response = await fetch('/mettascope/mettascope.html', { method: 'HEAD' })
      if (!response.ok) return
      mettascope.src = `/mettascope/mettascope.html?ws=${encodeURIComponent(websocketUrl.toString())}`
      mettascope.style.display = 'block'
      fallback.style.display = 'none'
    } catch (error) {
      console.warn('MettaScope dist unavailable, using canvas fallback', error)
    }
  }

  function drawStep(message) {
    if (message.initial_replay && message.initial_replay.map_size) mapSize = message.initial_replay.map_size
    const stepObjects = message.objects || []
    const walls = stepObjects.filter((object) => object.type_name === 'wall')
    if (walls.length > 0) staticObjects = walls
    dynamicObjects = stepObjects.filter((object) => object.type_name !== 'wall')
    const objects = [...staticObjects, ...dynamicObjects]
    if (message.state && message.state.map_size) mapSize = message.state.map_size
    const width = Number(mapSize[0] || 24)
    const height = Number(mapSize[1] || 24)
    const scale = Math.min(canvas.width / width, canvas.height / height)
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    ctx.fillStyle = '#f8fafc'
    ctx.fillRect(0, 0, width * scale, height * scale)
    ctx.strokeStyle = '#e2e8f0'
    ctx.lineWidth = 1
    for (let x = 0; x <= width; x += 1) {
      ctx.beginPath()
      ctx.moveTo(x * scale, 0)
      ctx.lineTo(x * scale, height * scale)
      ctx.stroke()
    }
    for (let y = 0; y <= height; y += 1) {
      ctx.beginPath()
      ctx.moveTo(0, y * scale)
      ctx.lineTo(width * scale, y * scale)
      ctx.stroke()
    }

    for (const object of objects) {
      const location = object.location || [0, 0]
      const x = Number(location[0] || 0)
      const y = Number(location[1] || 0)
      const px = x * scale
      const py = y * scale
      if (object.type_name === 'wall') {
        ctx.fillStyle = '#334155'
        ctx.fillRect(px, py, scale, scale)
        continue
      }
      if (object.is_agent || object.type_name === 'agent') {
        const agentId = Number(object.agent_id || 0)
        ctx.fillStyle = agentColors[agentId % agentColors.length]
        ctx.beginPath()
        ctx.arc(px + scale / 2, py + scale / 2, Math.max(4, scale * 0.38), 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#ffffff'
        ctx.font = `${Math.max(9, scale * 0.42)}px system-ui`
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(String(agentId + 1), px + scale / 2, py + scale / 2)
        continue
      }
      ctx.fillStyle = '#d97706'
      ctx.fillRect(px + scale * 0.18, py + scale * 0.18, scale * 0.64, scale * 0.64)
    }
  }

  function renderState(message) {
    const state = message.state || message.status || message
    const renderedStep = message.step ?? state.step ?? message.steps ?? state.steps
    protocol.textContent = message.protocol || state.protocol || '-'
    mission.textContent = state.mission || '-'
    step.textContent = String(renderedStep ?? '-')
    players.textContent = `${state.connected_players ?? 0}/${state.num_agents ?? 0}`
    scores.textContent = JSON.stringify(state.scores || [])
    status.textContent = state.done ? (renderedStep == null ? 'Done' : `Done after ${renderedStep} steps`) : 'Connected'
    latest.textContent = JSON.stringify(
      {
        type: message.type,
        step: renderedStep,
        objects: message.objects ? message.objects.length : undefined,
        state,
      },
      null,
      2
    )
  }

  loadMettascope()
  const socket = new WebSocket(websocketUrl)
  socket.onopen = () => {
    status.textContent = 'Connected'
  }
  socket.onmessage = (event) => {
    const message = JSON.parse(event.data)
    if (message.initial_replay && message.initial_replay.map_size) mapSize = message.initial_replay.map_size
    if (message.type === 'step') drawStep(message)
    renderState(message)
  }
  socket.onclose = () => {
    status.textContent = 'Disconnected'
  }
</script>
