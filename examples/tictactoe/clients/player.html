<!doctype html>
<title>Coworld Tic-Tac-Toe Player Client</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 24px; }
  #board { display: grid; grid-template-columns: repeat(3, 64px); gap: 6px; margin: 16px 0; }
  button { background: white; border: 1px solid #999; font-size: 28px; height: 64px; width: 64px; }
  button:disabled { color: #222; }
</style>
<h1>Tic-Tac-Toe</h1>
<div id="status"></div>
<div id="board"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const address = params.get("address");
  const board = document.getElementById("board");
  const status = document.getElementById("status");
  let socket;
  let canMove = false;

  function draw(cells) {
    board.replaceChildren(...cells.map((value, index) => {
      const button = document.createElement("button");
      button.textContent = value;
      button.disabled = Boolean(value) || !canMove;
      button.onclick = () => {
        socket.send(JSON.stringify({ move: index }));
        canMove = false;
        draw(cells);
        status.textContent = "Waiting";
      };
      return button;
    }));
  }

  if (address) {
    socket = new WebSocket(address);
    socket.onopen = () => { status.textContent = "Connected"; };
    socket.onmessage = (event) => {
      const message = JSON.parse(event.data);
      if (message.board) {
        canMove = message.type === "turn";
        draw(message.board);
      }
      if (message.type === "turn") {
        status.textContent = "Your move";
      }
      if (message.done) {
        status.textContent = `Done. Winner: ${message.winner}`;
      }
    };
    socket.onclose = () => { status.textContent = "Disconnected"; };
  } else {
    status.textContent = "Missing address";
  }
</script>
