<!doctype html>
<title>Coworld Tic-Tac-Toe Replay Client</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 24px; }
  #board { display: grid; grid-template-columns: repeat(3, 64px); gap: 6px; margin: 16px 0; }
  .cell { align-items: center; border: 1px solid #999; display: flex; font-size: 28px; height: 64px; justify-content: center; }
  pre { background: #f5f5f5; padding: 12px; width: min(640px, 100%); }
</style>
<h1>Tic-Tac-Toe Replay</h1>
<div id="status"></div>
<button id="play">Play</button>
<button id="pause">Pause</button>
<button id="faster">Faster</button>
<div id="board"></div>
<pre id="moves"></pre>
<script type="module">
  const websocketUrl = new URL(window.location.href);
  websocketUrl.protocol = websocketUrl.protocol === "https:" ? "wss:" : "ws:";

  const board = document.getElementById("board");
  const status = document.getElementById("status");
  const moves = document.getElementById("moves");
  const play = document.getElementById("play");
  const pause = document.getElementById("pause");
  const faster = document.getElementById("faster");
  let speed = 1;

  function draw(cells) {
    board.replaceChildren(...cells.map((value) => {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = value;
      return cell;
    }));
  }

  const socket = new WebSocket(websocketUrl);
  socket.onopen = () => { status.textContent = "Connected"; };
  socket.onmessage = (event) => {
    const message = JSON.parse(event.data);
    if (message.type === "replay") {
      draw(message.board);
      status.textContent = `Winner: ${message.results.winner}`;
      moves.textContent = JSON.stringify(message.moves, null, 2);
    }
    if (message.type === "control") {
      status.textContent = `Control: ${JSON.stringify(message.command)}`;
    }
  };
  socket.onclose = () => { status.textContent = "Disconnected"; };

  play.onclick = () => socket.send(JSON.stringify({ command: "play" }));
  pause.onclick = () => socket.send(JSON.stringify({ command: "pause" }));
  faster.onclick = () => {
    speed *= 2;
    socket.send(JSON.stringify({ command: "speed", speed }));
  };
</script>
