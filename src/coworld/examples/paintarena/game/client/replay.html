<!doctype html>
<title>Coworld Paint Arena Replay Client</title>
<style>
  body {
    background: #f6f8fb;
    color: #172033;
    font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    padding: 10px;
  }
  * {
    box-sizing: border-box;
  }
  main {
    display: grid;
    gap: 8px;
    grid-template-rows: auto minmax(0, 1fr);
    height: 100%;
  }
  .topbar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 8px;
    align-items: center;
  }
  .title {
    align-items: baseline;
    display: flex;
    flex: 0 0 auto;
    gap: 6px;
  }
  h1 {
    font-size: clamp(18px, 2.3vw, 26px);
    line-height: 1;
    margin: 0;
  }
  .eyebrow {
    color: #637089;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  #status {
    background: #172033;
    border-radius: 999px;
    color: white;
    display: inline-flex;
    font-size: 12px;
    font-weight: 800;
    margin-left: auto;
    padding: 5px 9px;
    white-space: nowrap;
  }
  #scores {
    display: flex;
    flex: 1 1 220px;
    flex-wrap: wrap;
    gap: 4px;
    min-width: 0;
  }
  .score {
    align-items: center;
    background: white;
    border: 1px solid #cdd6e4;
    border-radius: 999px;
    display: inline-flex;
    font-size: 12px;
    font-weight: 900;
    gap: 6px;
    padding: 4px 8px;
  }
  .score::before {
    background: var(--color);
    border-radius: 999px;
    content: "";
    flex: 0 0 auto;
    height: 10px;
    width: 10px;
  }
  #arenaShell {
    display: grid;
    min-height: 0;
    overflow: hidden;
    place-items: start center;
  }
  #arena {
    background: #d8e0ec;
    border: 1px solid #b8c4d8;
    border-radius: 8px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, .8), 0 18px 50px rgba(23, 32, 51, .12);
    display: grid;
    gap: 3px;
    overflow: hidden;
    padding: 6px;
  }
  .cell {
    aspect-ratio: 1;
    background: #f8fafc;
    border-radius: 5px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, .85);
    min-height: 0;
    min-width: 0;
    overflow: hidden;
    position: relative;
  }
  .owned-0 {
    background: #93c5fd;
  }
  .owned-1 {
    background: #fca5a5;
  }
  .owned-2 {
    background: #86efac;
  }
  .owned-3 {
    background: #c4b5fd;
  }
  .agent {
    color: white;
    display: grid;
    font-size: 13px;
    font-weight: 900;
    place-items: center;
    text-shadow: 0 1px 1px rgba(0, 0, 0, .3);
  }
  .agent::after {
    content: attr(data-heading);
    font-size: min(42px, calc(var(--cell-size, 24px) * .72));
    line-height: 1;
  }
  .agent-0 {
    background: linear-gradient(145deg, #60a5fa, #2563eb);
  }
  .agent-1 {
    background: linear-gradient(145deg, #fb7185, #dc2626);
  }
  .agent-2 {
    background: linear-gradient(145deg, #34d399, #059669);
  }
  .agent-3 {
    background: linear-gradient(145deg, #a78bfa, #7c3aed);
  }
  .controls {
    align-items: center;
    display: flex;
    flex: 1 1 300px;
    flex-wrap: wrap;
    gap: 6px;
    min-width: 0;
  }
  .buttons {
    display: flex;
    gap: 4px;
  }
  button {
    background: linear-gradient(#ffffff, #eef3fa);
    border: 1px solid #9aa8bd;
    border-radius: 8px;
    color: #172033;
    cursor: pointer;
    font-size: 12px;
    font-weight: 800;
    min-height: 28px;
    padding: 4px 8px;
    white-space: nowrap;
  }
  button:hover {
    border-color: #64748b;
    transform: translateY(-1px);
  }
  input {
    accent-color: #2563eb;
    flex: 1 1 90px;
    min-width: 80px;
  }
  @media (max-width: 980px) {
    body {
      padding: 8px;
    }
    main {
      gap: 6px;
    }
    .topbar {
      align-items: center;
    }
    #status {
      margin-left: 0;
    }
  }
</style>
<main>
  <header class="topbar">
    <div class="title">
      <div class="eyebrow">Replay</div>
      <h1>Paint Arena</h1>
    </div>
    <div id="scores"></div>
    <div class="controls">
      <div class="buttons">
        <button id="play" type="button">Play</button>
        <button id="pause" type="button">Pause</button>
        <button id="slower" type="button">Slower</button>
        <button id="faster" type="button">Faster</button>
      </div>
      <input id="scrubber" aria-label="Replay frame" min="0" type="range" value="0" />
    </div>
    <div id="status">Connecting</div>
  </header>
  <section id="arenaShell">
    <div id="arena"></div>
  </section>
</main>
<script type="module">
  const websocketUrl = new URL(window.location.href);
  websocketUrl.protocol = websocketUrl.protocol === "https:" ? "wss:" : "ws:";
  websocketUrl.pathname = websocketUrl.pathname.replace(/\/client\/replay(\/.*)?$/, "/replay$1");

  const arena = document.getElementById("arena");
  const arenaShell = document.getElementById("arenaShell");
  const status = document.getElementById("status");
  const scores = document.getElementById("scores");
  const play = document.getElementById("play");
  const pause = document.getElementById("pause");
  const slower = document.getElementById("slower");
  const faster = document.getElementById("faster");
  const scrubber = document.getElementById("scrubber");
  const colors = ["#2563eb", "#dc2626", "#059669", "#7c3aed"];
  const headingSymbols = { up: "↑", down: "↓", left: "←", right: "→", stay: "•" };
  let frames = [];
  let results = {};
  let frameIndex = 0;
  let speed = 1;
  let timer = null;

  function draw(message) {
    scrubber.value = frameIndex;
    scores.replaceChildren(...message.scores.map((score, slot) => {
      const scoreEl = document.createElement("div");
      scoreEl.className = "score";
      scoreEl.style.setProperty("--color", colors[slot]);
      scoreEl.textContent = `${message.player_names[slot]}: ${score}`;
      return scoreEl;
    }));
    status.textContent = `Frame ${frameIndex + 1}/${frames.length} · tick ${message.tick}/${message.max_ticks} · ${speed}x`;
    resizeArena(message);
    const agents = new Map(message.positions.map((position, slot) => [`${position[0]},${position[1]}`, slot]));
    const previous = frames[Math.max(frameIndex - 1, 0)] || message;
    const cells = [];
    for (let y = 0; y < message.height; y += 1) {
      for (let x = 0; x < message.width; x += 1) {
        const key = `${x},${y}`;
        const owner = message.tile_owners[y * message.width + x];
        const cell = document.createElement("div");
        cell.className = "cell";
        if (owner >= 0) cell.classList.add(`owned-${owner}`);
        if (agents.has(key)) {
          const slot = agents.get(key);
          cell.className = `cell agent owned-${slot} agent-${slot}`;
          cell.dataset.heading = headingFor(previous.positions[slot], message.positions[slot]);
        }
        cells.push(cell);
      }
    }
    arena.replaceChildren(...cells);
  }

  function resizeArena(message) {
    const bounds = arenaShell.getBoundingClientRect();
    if (bounds.width <= 0 || bounds.height <= 0) return;
    const style = window.getComputedStyle(arena);
    const gap = Number.parseFloat(style.columnGap) || 0;
    const paddingX = (Number.parseFloat(style.paddingLeft) || 0) + (Number.parseFloat(style.paddingRight) || 0);
    const paddingY = (Number.parseFloat(style.paddingTop) || 0) + (Number.parseFloat(style.paddingBottom) || 0);
    const borderX = (Number.parseFloat(style.borderLeftWidth) || 0) + (Number.parseFloat(style.borderRightWidth) || 0);
    const borderY = (Number.parseFloat(style.borderTopWidth) || 0) + (Number.parseFloat(style.borderBottomWidth) || 0);
    const cellSize = Math.floor(Math.min(
      (bounds.width - paddingX - borderX - gap * (message.width - 1)) / message.width,
      (bounds.height - paddingY - borderY - gap * (message.height - 1)) / message.height,
    ));
    if (cellSize <= 0) return;
    arena.style.setProperty("--cell-size", `${cellSize}px`);
    arena.style.gridTemplateColumns = `repeat(${message.width}, ${cellSize}px)`;
    arena.style.gridAutoRows = `${cellSize}px`;
    arena.style.width = `${cellSize * message.width + gap * (message.width - 1) + paddingX + borderX}px`;
    arena.style.height = `${cellSize * message.height + gap * (message.height - 1) + paddingY + borderY}px`;
  }

  function headingFor(previous, current) {
    const dx = current[0] - previous[0];
    const dy = current[1] - previous[1];
    if (dx > 0) return headingSymbols.right;
    if (dx < 0) return headingSymbols.left;
    if (dy > 0) return headingSymbols.down;
    if (dy < 0) return headingSymbols.up;
    return headingSymbols.stay;
  }

  function showFrame(index) {
    frameIndex = Math.min(Math.max(index, 0), frames.length - 1);
    draw(frames[frameIndex]);
  }

  function stop() {
    clearInterval(timer);
    timer = null;
  }

  function start() {
    stop();
    if (frames.length === 0) return;
    timer = setInterval(() => {
      if (frameIndex >= frames.length - 1) {
        showFrame(0);
      } else {
        showFrame(frameIndex + 1);
      }
    }, 200 / speed);
  }

  const socket = new WebSocket(websocketUrl);
  socket.onopen = () => {
    status.textContent = "Connected";
  };
  socket.onmessage = (event) => {
    const message = JSON.parse(event.data);
    if (message.type !== "replay") return;
    frames = message.frames.map(frame => ({ ...frame, player_names: message.player_names }));
    results = message.results;
    scrubber.max = Math.max(frames.length - 1, 0);
    if (frames.length > 0) {
      showFrame(0);
      start();
    }
  };
  socket.onclose = () => {
    if (frames.length === 0) status.textContent = "Disconnected";
  };

  play.onclick = () => start();
  pause.onclick = () => stop();
  slower.onclick = () => {
    speed = Math.max(speed / 2, 0.25);
    if (timer) start();
    if (frames.length > 0) draw(frames[frameIndex]);
  };
  faster.onclick = () => {
    speed = Math.min(speed * 2, 8);
    if (timer) start();
    if (frames.length > 0) draw(frames[frameIndex]);
  };
  scrubber.oninput = () => {
    stop();
    showFrame(Number(scrubber.value));
  };
  window.addEventListener("resize", () => {
    if (frames.length > 0) resizeArena(frames[frameIndex]);
  });
</script>
